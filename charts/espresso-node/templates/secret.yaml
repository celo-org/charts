{{- if and (not .Values.espresso.existingSecret) (or .Values.espresso.privateStakingKey .Values.espresso.privateStateKey) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "espresso-node.fullname" . }}-keys
  labels:
    {{- include "espresso-node.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.espresso.privateStakingKey }}
  ESPRESSO_SEQUENCER_PRIVATE_STAKING_KEY: {{ .Values.espresso.privateStakingKey | quote }}
  {{- end }}
  {{- if .Values.espresso.privateStateKey }}
  ESPRESSO_SEQUENCER_PRIVATE_STATE_KEY: {{ .Values.espresso.privateStateKey | quote }}
  {{- end }}
{{- end }}
