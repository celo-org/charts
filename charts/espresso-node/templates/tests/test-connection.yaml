apiVersion: v1
kind: Pod
metadata:
  name: {{ include "espresso-node.fullname" . }}-test-connection
  labels:
    {{- include "espresso-node.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "espresso-node.fullname" . }}:{{ .Values.service.port }}/healthcheck']
  restartPolicy: Never
