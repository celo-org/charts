apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ template "op-reth.fullname" . }}
  labels:
    {{- include "op-reth.labels" . | nindent 4 }}
spec:
  serviceName: {{ template "op-reth.name" . }}
  replicas: {{ .Values.replicaCount }}
  updateStrategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "op-reth.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/configmap-scripts: {{ include (print $.Template.BasePath "/configmap-scripts.yaml") . | sha256sum }}
        {{- if or .Values.syncToS3.enabled .Values.initFromS3.enabled }}
        checksum/s3-secret: {{ include (print $.Template.BasePath "/s3-secret.yaml") . | sha256sum }}
        checksum/s3-configmap: {{ include (print $.Template.BasePath "/s3-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.config.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "6060"
        prometheus.io/path: "/debug/metrics/prometheus"
        {{- end }}
      labels:
        {{- include "op-reth.selectorLabels" . | nindent 8 }}
        {{- with .Values.podStatusLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      enableServiceLinks: {{ .Values.enableServiceLinks }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "op-reth.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- if .Values.init.chownData.enabled }}
      - name: chown-data
        image: "{{ .Values.init.chownData.image.repository }}:{{ .Values.init.chownData.image.tag }}"
        imagePullPolicy: {{ .Values.init.chownData.image.pullPolicy | quote }}
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
        command: ["chown", "-R", "{{ .Values.securityContext.runAsUser }}:{{ .Values.securityContext.runAsGroup }}", "/data"]
        volumeMounts:
        - name: data
          mountPath: /data
      {{- end }}
      {{- if or .Values.init.genesis.enabled .Values.init.rollup.enabled }}
      - name: init-genesis
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command: ["sh", "/scripts/init-genesis.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: data
          mountPath: {{ .Values.persistence.mountPath | default .Values.config.datadir }}
      {{- end }}
      {{- if .Values.initFromS3.enabled }}
      {{- with .Values.s3config }}
      - name: init-from-s3
        image: "{{ .image.repository }}:{{ .image.tag }}"
        imagePullPolicy: {{ .image.pullPolicy | quote }}
        {{- with $.Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        - sh
        - /scripts/init-from-s3.sh
        envFrom:
        - configMapRef:
            name: {{ include "op-reth.fullname" $ }}-s3-config
        - secretRef:
            name: {{ include "op-reth.fullname" $ }}-s3-secret
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: data
          mountPath: {{ $.Values.persistence.mountPath | default $.Values.config.datadir }}
      {{- end }}
      {{- end }}
      {{- if .Values.syncToS3.enabled }}
      {{- with .Values.s3config }}
      - name: sync-to-s3
        image: "{{ .image.repository }}:{{ .image.tag }}"
        imagePullPolicy: {{ .image.pullPolicy | quote }}
        {{- with $.Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        - /bin/sh
        - /scripts/sync-to-s3.sh
        envFrom:
        - configMapRef:
            name: {{ include "op-reth.fullname" $ }}-s3-config
        - secretRef:
            name: {{ include "op-reth.fullname" $ }}-s3-secret
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: data
          mountPath: {{ $.Values.persistence.mountPath | default $.Values.config.datadir }}
      {{- end }}
      {{- with .Values.syncToS3.cronjob }}
      {{- if .enabled }}
      - name: disable-sync-to-s3
        image: "{{ .image.repository }}:{{ .image.tag }}"
        imagePullPolicy: {{ .image.pullPolicy | quote }}
        {{- with $.Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command:
        - /bin/sh
        - /scripts/s3-cron.sh
        - disable_sync
        - 5s
        volumeMounts:
        - name: scripts
          mountPath: /scripts
      {{- end }}
      {{- end }}
      {{- end }}
      - name: split-parameters
        image: "{{ .Values.init.parameters.image.repository }}:{{ .Values.init.parameters.image.tag }}"
        imagePullPolicy: {{ .Values.init.parameters.image.pullPolicy | quote }}
        env:
        - name: JWT
          valueFrom:
            secretKeyRef:
              name: {{ ternary (include "op-reth.fullname" .) .Values.secrets.jwt.secretName (not (empty .Values.secrets.jwt.value)) }}
              key: {{ ternary "jwt" .Values.secrets.jwt.secretKey (not (empty .Values.secrets.jwt.value)) }}
        {{- if or .Values.secrets.nodeKey.value .Values.secrets.nodeKey.secretName }}
        - name: NODEKEYS
          valueFrom:
            secretKeyRef:
              name: {{ ternary (include "op-reth.fullname" .) .Values.secrets.nodeKey.secretName (not (empty .Values.secrets.nodeKey.value)) }}
              key: {{ ternary "nodeKey" .Values.secrets.nodeKey.secretKey (not (empty .Values.secrets.nodeKey.value)) }}
        {{- end }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        command: ["sh", "/scripts/split-parameters.sh"]
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: data
          mountPath: {{ .Values.persistence.mountPath | default .Values.config.datadir }}
      {{- with .Values.extraInitContainers }}
        {{- tpl (toYaml . | nindent 6) $ }}
      {{- end }}
      containers:
      - name: op-reth
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.command }}
        command:
          {{- tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
        args:
        - |
          datadir="{{ .Values.persistence.mountPath | default .Values.config.datadir }}"
          {{- if .Values.config.nat }}
          natFlag="--nat={{ .Values.config.nat }}"
          {{- else }}
          natFlag="--nat=extip:$(cat $datadir/announce_ip)"
          {{- end }}
          [ -f $datadir/nodeKey ] && nodeKeyFlag="--p2p-secret-key=$datadir/nodeKey" || nodeKeyFlag=""
          exec celo-reth node \
            --datadir={{ .Values.config.datadir }} \
            {{- if .Values.config.chain }}
            --chain={{ .Values.config.chain }} \
            {{- else }}
            --chain=$datadir/genesis.json \
            {{- end }}
            {{- with .Values.config.networkId }}
            --network-id={{ int . }} \
            {{- end }}
            --max-peers={{ .Values.config.maxpeers }} \
            {{- with .Values.config.full }}
            --full \
            {{- end }}
            $nodeKeyFlag \
            {{- if .Values.config.disableDiscovery }}
            --disable-discovery \
            {{- end }}
            --authrpc.addr=0.0.0.0 \
            --authrpc.jwtsecret=$datadir/jwt.hex \
            --authrpc.port={{ .Values.config.authrpc.port }} \
            --http \
            --http.addr=0.0.0.0 \
            --http.port={{ .Values.config.http.port }} \
            --http.api={{ join "," .Values.config.http.api }} \
            --http.corsdomain={{ join "," .Values.config.http.corsdomain }} \
            {{- with .Values.config.rollup }}
            {{- if .sequencerhttp }}
            --rollup.sequencer={{ .sequencerhttp }} \
            {{- end }}
            {{- with .disabletxpoolgossip }}
            --rollup.disable-tx-pool-gossip \
            {{- end }}
            {{- end }}
            {{- if .Values.config.ws.enabled }}
            --ws \
            --ws.addr=0.0.0.0 \
            --ws.api={{ join "," .Values.config.ws.api }} \
            --ws.origins={{ join "," .Values.config.ws.origins }} \
            --ws.port={{ .Values.config.ws.port }} \
            {{- end }}
            {{- if .Values.config.metrics.enabled }}
            --metrics=0.0.0.0:6060 \
            {{- end }}
            {{- with .Values.config.logFilter }}
            --log.stdout.filter={{ . }} \
            {{- end }}
            --log.stdout.format={{ .Values.config.logFormat }} \
            {{- with .Values.config.bootnodes }}
            --bootnodes={{ join "," . }} \
            {{- end }}
            {{- with .Values.config.trustedPeers }}
            --trusted-peers={{ join "," . }} \
            {{- end }}
            {{- if .Values.config.trustedOnly }}
            --trusted-only \
            {{- end }}
            {{- with .Values.config.netrestrict }}
            --netrestrict={{ join "," . }} \
            {{- end }}
            {{- if not .Values.config.disableDiscovery }}
            --port={{ .Values.config.port }} \
            {{- end }}
            $natFlag \
            {{- with .Values.extraArgs }}
            {{- range . }}
            {{- tpl (.) $ | nindent 12 }} \
            {{- end }}
            {{- end }}

        env:
        - name: RETH_DATADIR
          value: {{ .Values.config.datadir }}
        {{-  with .Values.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.config.http.port }}
        - name: authrpc
          containerPort: {{ .Values.config.authrpc.port }}
        {{- if and .Values.config.ws.enabled (ne .Values.config.http.port .Values.config.ws.port) }}
        - name: ws
          containerPort: {{ .Values.config.ws.port }}
        {{- end }}
        {{- if .Values.config.metrics.enabled }}
        - name: metrics
          containerPort: 6060
        {{- end }}
        {{- if not .Values.config.disableDiscovery }}
        - name: p2p-tcp
          containerPort: {{ .Values.config.port }}
          {{- if .Values.config.useHostPort }}
          hostPort: {{ .Values.config.port }}
          {{- end }}
          protocol: TCP
        - name: p2p-udp
          containerPort: {{ .Values.config.port }}
          {{- if .Values.config.useHostPort }}
          hostPort: {{ .Values.config.port }}
          {{- end }}
          protocol: UDP
        {{- end }}
        {{- if .Values.livenessProbe.enabled }}
        livenessProbe:
          {{- include "op-reth.healthcheck" (list $ .Values.livenessProbe) | nindent 10 }}
        {{- end }}
        {{- if .Values.readinessProbe.enabled }}
        readinessProbe:
          {{- include "op-reth.healthcheck" (list $ .Values.readinessProbe) | nindent 10 }}
        {{- end }}
        {{- if .Values.startupProbe.enabled }}
        startupProbe:
          {{- include "op-reth.healthcheck" (list $ .Values.startupProbe) | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: {{ .Values.persistence.mountPath | default .Values.config.datadir }}
        - name: scripts
          mountPath: /scripts
        {{- with .Values.extraVolumeMounts }}
        {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      {{- with .Values.sidecarContainers }}
        {{- tpl (toYaml . | nindent 6) $ }}
      {{- end }}
      volumes:
      - name: scripts
        configMap:
          name: {{ template "op-reth.fullname" . }}-scripts
      {{- if eq .Values.persistence.type "hostPath" }}
      - name: data
        hostPath:
          path: {{ .Values.persistence.hostPath.path }}
          type: {{ .Values.persistence.hostPath.type }}
      {{- end }}
      {{- with .Values.extraVolumes }}
      {{- tpl (toYaml .) $ | nindent 6 }}
      {{- end }}
  {{- if eq .Values.persistence.type "pvc" }}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        {{- include "op-reth.selectorLabels" . | nindent 8 }}
      {{- with .Values.persistence.pvc.annotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      accessModes:
      - {{ .Values.persistence.pvc.accessMode }}
      {{- if .Values.persistence.pvc.storageClass }}
      {{- if eq .Values.persistence.pvc.storageClass "-" }}
      storageClassName: ""
      {{- else }}
      storageClassName: {{ .Values.persistence.pvc.storageClass | quote }}
      {{- end }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.pvc.size | quote }}
  {{- end }}