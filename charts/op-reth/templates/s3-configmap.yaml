{{- if or .Values.initFromS3.enabled .Values.syncToS3.enabled }}
{{- fail "op-reth: S3 snapshot sync is disabled — its scripts target op-geth's <datadir>/geth/chaindata layout, which does not exist on reth. A reth-aware rewrite is in progress; do not enable initFromS3 or syncToS3 in the meantime." }}
{{- end }}
{{- if or .Values.initFromS3.enabled .Values.syncToS3.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "op-reth.fullname" . }}-s3-config
data:
  DATA_DIR: {{ tpl .Values.s3config.local.datadir . | quote }}
  INITIALIZED_FILE: {{ tpl .Values.s3config.local.initializedFile . | quote }}
  SYNC_TO_S3: "False"
  S3_BASE_URL: {{ tpl .Values.s3config.remote.baseUrl . }}
  FORCE_INIT: {{ ternary "True" "False" .Values.initFromS3.force | quote }}
{{- end }}
